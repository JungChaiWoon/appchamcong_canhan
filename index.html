<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tính Công Minh Tiền</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans p-4 antialiased select-none">

    <div class="max-w-md mx-auto space-y-4">
        
        <header class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-emerald-400" id="current-month-title">Tháng Công</h1>
                <p class="text-xs text-slate-400">jungchaiwoon2004@gmail.com</p>
            </div>
            <div id="drive-status" class="text-[10px] bg-red-500/20 text-red-400 border border-red-500/30 px-2 py-1 rounded-lg font-bold">Drive: Chưa kết nối</div>
        </header>

        <div class="bg-gradient-to-br from-emerald-600 to-teal-700 p-5 rounded-2xl shadow-lg grid grid-cols-2 gap-4">
            <div>
                <p class="text-xs opacity-80 uppercase font-bold tracking-wider">Số công trong tháng</p>
                <div class="text-3xl font-black mt-1" id="total-cong-thang">0.0</div>
            </div>
            <div>
                <p class="text-xs opacity-80 uppercase font-bold tracking-wider">Số giờ làm việc</p>
                <div class="text-3xl font-black mt-1" id="total-gio-thang">0.0</div>
            </div>
            <div class="border-t border-white/20 pt-3 flex justify-between items-center">
                <p class="text-xs opacity-80 uppercase font-bold tracking-wider">Tổng lương dự kiến:</p>
                <div class="text-2xl font-black text-yellow-300" id="total-luong-thang">0 VNĐ</div>
            </div>
        </div>

        <div class="bg-slate-800 p-3 rounded-2xl border border-slate-700 shadow-xl grid grid-cols-2 gap-3">
            <button onclick="uploadToDrive()" id="btn-upload" class="bg-blue-600 hover:bg-blue-700 text-white font-bold p-2.5 rounded-xl text-xs transition flex items-center justify-center gap-1 opacity-50 cursor-not-allowed" disabled>
                📤 Đẩy Data lên Drive
            </button>
            <button onclick="downloadFromDrive()" id="btn-download" class="bg-teal-600 hover:bg-teal-700 text-white font-bold p-2.5 rounded-xl text-xs transition flex items-center justify-center gap-1 opacity-50 cursor-not-allowed" disabled>
                📥 Kéo Data từ Drive về
            </button>
        </div>

        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl">
            <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-400 mb-2">
                <div class="text-red-400">CN</div><div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div>
            </div>
            <div class="grid grid-cols-7 gap-2 text-center" id="calendar-grid"></div>
        </div>

        <div id="detail-panel" class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl space-y-4 hidden">
            <div class="border-b border-slate-700 pb-2 flex justify-between items-center">
                <h3 class="font-bold text-emerald-400" id="selected-date-label">Ngày</h3>
                <span id="holiday-badge" class="hidden bg-red-500/20 text-red-400 border border-red-500/30 text-[10px] px-2 py-0.5 rounded-full font-bold">Ngày Lễ (x2)</span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <label class="flex items-center justify-between p-3 bg-slate-900 rounded-xl border border-slate-700/50 cursor-pointer">
                    <span class="text-sm">Ca Sáng (0.5)</span>
                    <input type="checkbox" id="ca-sang" onchange="updateDayData()" class="w-5 h-5 rounded accent-emerald-500">
                </label>
                <label class="flex items-center justify-between p-3 bg-slate-900 rounded-xl border border-slate-700/50 cursor-pointer">
                    <span class="text-sm">Ca Chiều (0.5)</span>
                    <input type="checkbox" id="ca-chieu" onchange="updateDayData()" class="w-5 h-5 rounded accent-emerald-500">
                </label>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Ca Trưa (Số phút tăng ca):</label>
                    <input type="number" id="ca-trua" value="0" min="0" oninput="updateDayData()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-slate-200 text-sm focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Ca Tối (Số phút tăng ca):</label>
                    <input type="number" id="ca-toi" value="0" min="0" oninput="updateDayData()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-slate-200 text-sm focus:outline-none focus:border-emerald-500">
                </div>
            </div>

            <div class="bg-slate-900 p-3 rounded-xl text-xs space-y-1.5 border border-slate-700/30">
                <div class="flex justify-between">
                    <span class="text-slate-400">Công làm việc trong ngày:</span>
                    <span class="font-bold text-slate-200" id="day-cong-result">0.0 công</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">Giờ làm việc trong ngày:</span>
                    <span class="font-bold text-emerald-400" id="day-gio-result">0 giờ</span>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl">
            <label class="block text-xs text-slate-400 mb-1 font-bold uppercase tracking-wider">Cấu hình lương cơ bản:</label>
            <div class="relative">
                <input type="text" id="luong-co-ban" value="6.000.000" oninput="formatCurrencyInput(this)" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-emerald-400 font-bold focus:outline-none focus:border-emerald-500 pr-12">
                <span class="absolute right-4 top-3.5 text-xs text-slate-500 font-bold">VNĐ</span>
            </div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH GOOGLE CLIENT ID CỦA M VÀO ĐÂY ---
        const CLIENT_ID = '390818719954-qkfh49tn2ma8vssnb17nt7ikvctj8ng0.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const FILE_NAME = 'minhtien_chamcong_db.json'; 

        let tokenClient;
        let accessToken = null;
        let dbData = {};
        let selectedDateStr = "";
        const VIETNAM_HOLIDAYS = ['01-01', '30-04', '01-05', '02-09'];

        window.onload = function() {
            gapi.load('client', initGapiClient);
            initTokenClient();
            initApp();
        };

        // --- INTERACTION VỚI GOOGLE DRIVE API ---
        function initGapiClient() {
            gapi.client.init({}).then(() => {
                gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
            }).catch(err => {
                console.error("Lỗi init GAPI client:", err);
            });
        }

        function initTokenClient() {
            // Khởi tạo client dùng cơ chế Pop-up chuẩn, bỏ hẳn chế độ tự động gọi ngầm gây crash trên Brave
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) {
                        alert("Lỗi xác thực từ Google: " + tokenResponse.error);
                        return;
                    }
                    // Đăng nhập thành công, lưu Token
                    accessToken = tokenResponse.access_token;
                    
                    // Đổi màu thông báo trạng thái kết nối Drive
                    document.getElementById('drive-status').innerText = "Drive: Đã Kết Nối ✅";
                    document.getElementById('drive-status').className = "text-[10px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2 py-1 rounded-lg font-bold";
                    
                    // Mở khóa 2 nút bấm Đẩy/Kéo dữ liệu
                    document.getElementById('btn-upload').disabled = false;
                    document.getElementById('btn-upload').classList.remove('opacity-50', 'cursor-not-allowed');
                    document.getElementById('btn-download').disabled = false;
                    document.getElementById('btn-download').classList.remove('opacity-50', 'cursor-not-allowed');
                    
                    // Thực hiện tiếp hành động được yêu cầu trước đó (nếu có)
                    if (window.pendingCallback) {
                        window.pendingCallback();
                        window.pendingCallback = null;
                    }
                },
            });
            
            // Ép nút hiển thị giao diện sẵn sàng để m bấm kích hoạt
            document.getElementById('btn-upload').disabled = false;
            document.getElementById('btn-upload').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('btn-download').disabled = false;
            document.getElementById('btn-download').classList.remove('opacity-50', 'cursor-not-allowed');
        }

        // Hàm kiểm tra quyền, nếu chưa đăng nhập sẽ ép thò pop-up đứng im chờ m click chọn tài khoản
        function checkAuth(callback) {
            if (accessToken === null) {
                window.pendingCallback = callback;
                // Thiết lập prompt: 'select_account' để ép Google giữ cửa sổ bắt chọn tài khoản, không cho tự đóng
                tokenClient.requestAccessToken({ prompt: 'select_account' });
            } else {
                callback();
            }
        }

        function uploadToDrive() {
            checkAuth(() => {
                document.getElementById('btn-upload').innerText = "⏳ Đang đẩy...";
                findFileOnDrive((fileId) => {
                    const content = localStorage.getItem('db_cham_cong') || '{}';
                    if (fileId) {
                        updateFileContent(fileId, content);
                    } else {
                        createFileOnDrive(content);
                    }
                });
            });
        }

        function downloadFromDrive() {
            checkAuth(() => {
                document.getElementById('btn-download').innerText = "⏳ Đang kéo...";
                findFileOnDrive((fileId) => {
                    if (!fileId) {
                        alert("Không tìm thấy file backup nào trên Drive của m!");
                        document.getElementById('btn-download').innerText = "📥 Kéo Data từ Drive về";
                        return;
                    }
                    gapi.client.drive.files.get({
                        fileId: fileId,
                        alt: 'media'
                    }).then(response => {
                        if(response.body) {
                            localStorage.setItem('db_cham_cong', response.body);
                            alert("Kéo dữ liệu thành công! App sẽ tự động reload.");
                            location.reload();
                        }
                    }).catch(err => {
                        console.error(err);
                        alert("Lỗi khi tải file!");
                    });
                });
            });
        }

        // --- LOGIC ĐƯA FILE VÀO THƯ MỤC APPCHAMCONG ---

        // Hàm tổng hợp để tìm hoặc tạo Folder, sau đó xử lý file
        function getFolderId(callback) {
            gapi.client.drive.files.list({
                q: "name = 'AppChamCong' and mimeType = 'application/vnd.google-apps.folder' and trashed = false",
                fields: 'files(id, name)',
                spaces: 'drive'
            }).then(response => {
                const files = response.result.files;
                if (files && files.length > 0) {
                    // Đã có folder, trả về ID luôn
                    callback(files[0].id);
                } else {
                    // Chưa có folder, tiến hành tạo mới
                    gapi.client.drive.files.create({
                        resource: {
                            name: 'AppChamCong',
                            mimeType: 'application/vnd.google-apps.folder'
                        },
                        fields: 'id'
                    }).then(folderResponse => {
                        callback(folderResponse.result.id);
                    }).catch(err => {
                        console.error("Lỗi tạo folder:", err);
                        alert("Không thể tạo thư mục AppChamCong trên Drive!");
                    });
                }
            }).catch(err => {
                console.error("Lỗi tìm folder:", err);
                callback(null);
            });
        }

        // Hàm tìm file JSON nằm TRONG thư mục AppChamCong
        function findFileOnDrive(folderId, callback) {
            gapi.client.drive.files.list({
                q: `name = '${FILE_NAME}' and '${folderId}' in parents and trashed = false`,
                fields: 'files(id, name)',
                spaces: 'drive'
            }).then(response => {
                const files = response.result.files;
                if (files && files.length > 0) {
                    callback(files[0].id);
                } else {
                    callback(null);
                }
            }).catch(err => {
                console.error("Lỗi tìm file:", err);
                callback(null);
            });
        }

        // Thay đổi hàm upload gốc để chạy theo luồng: Tìm Folder -> Tìm File -> Đẩy Data
        function uploadToDrive() {
            checkAuth(() => {
                document.getElementById('btn-upload').innerText = "⏳ Đang đẩy...";
                
                // 1. Tìm hoặc tạo thư mục AppChamCong trước
                getFolderId((folderId) => {
                    if (!folderId) {
                        alert("Lỗi xử lý thư mục!");
                        document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
                        return;
                    }
                    
                    // 2. Tìm file JSON bên trong thư mục đó
                    findFileOnDrive(folderId, (fileId) => {
                        const content = localStorage.getItem('db_cham_cong') || '{}';
                        if (fileId) {
                            // Nếu file đã nằm trong folder rồi thì chỉ cập nhật nội dung
                            updateFileContent(fileId, content);
                        } else {
                            // Nếu chưa có file thì tạo mới và chỉ định nằm trong folder
                            createFileOnDrive(folderId, content);
                        }
                    });
                });
            });
        }

        // Thay đổi hàm download gốc để tìm file trong đúng folder
        function downloadFromDrive() {
            checkAuth(() => {
                document.getElementById('btn-download').innerText = "⏳ Đang kéo...";
                
                getFolderId((folderId) => {
                    if (!folderId) {
                        alert("Lỗi xử lý thư mục!");
                        document.getElementById('btn-download').innerText = "📥 Kéo Data từ Drive về";
                        return;
                    }

                    findFileOnDrive(folderId, (fileId) => {
                        if (!fileId) {
                            alert("Không tìm thấy file backup nào trong thư mục AppChamCong!");
                            document.getElementById('btn-download').innerText = "📥 Kéo Data từ Drive về";
                            return;
                        }
                        gapi.client.drive.files.get({
                            fileId: fileId,
                            alt: 'media'
                        }).then(response => {
                            if(response.body) {
                                localStorage.setItem('db_cham_cong', response.body);
                                alert("Kéo dữ liệu thành công! App sẽ tự động reload.");
                                location.reload();
                            }
                        }).catch(err => {
                            console.error(err);
                            alert("Lỗi khi tải file!");
                            document.getElementById('btn-download').innerText = "📥 Kéo Data từ Drive về";
                        });
                    });
                });
            });
        }

        // Tạo file mới nằm trong thư mục chỉ định
        function createFileOnDrive(folderId, content) {
            const boundary = 'foo_bar_baz';
            const delimiter = "\r\n--" + boundary + "\r\n";
            const close_delimiter = "\r\n--" + boundary + "--";

            // Nhét cái folderId vào mảng parents để Google biết đường quăng file vô đó
            const metadata = {
                'name': FILE_NAME,
                'mimeType': 'application/json',
                'parents': [folderId]
            };

            const multipartRequestBody =
                delimiter +
                'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                JSON.stringify(metadata) +
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                content +
                close_delimiter;

            gapi.client.request({
                'path': '/upload/drive/v3/files',
                'method': 'POST',
                'params': {'uploadType': 'multipart'},
                'headers': {
                    'Content-Type': 'multipart/related; boundary="' + boundary + '"'
                },
                'body': multipartRequestBody
            }).then(() => {
                alert("Đã tạo mới và đồng bộ thành công vào thư mục AppChamCong!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            }).catch(err => {
                console.error(err);
                alert("Lỗi khi tạo file mới!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            });
        }

        // Cập nhật nội dung file (giữ nguyên path cũ vì fileId không đổi)
        function updateFileContent(fileId, content) {
            gapi.client.request({
                'path': `/upload/drive/v3/files/${fileId}`,
                'method': 'PATCH',
                'params': {'uploadType': 'media'},
                'body': content
            }).then(() => {
                alert("Đã cập nhật dữ liệu mới nhất vào thư mục AppChamCong!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            }).catch(err => {
                console.error(err);
                alert("Lỗi khi cập nhật file!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            });
        }

        // --- LOGIC CORE CỦA APP ---
        function initApp() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1;

            document.getElementById('current-month-title').innerText = `Tháng ${currentMonth} / ${currentYear}`;

            if(localStorage.getItem('luong_cb')) {
                document.getElementById('luong-co-ban').value = localStorage.getItem('luong_cb');
            }

            const savedData = localStorage.getItem('db_cham_cong');
            if(savedData) dbData = JSON.parse(savedData);

            cleanOldYearData(currentYear);
            renderCalendar(currentYear, currentMonth);
            calculateThangTotals(currentYear, currentMonth);
        }

        function cleanOldYearData(currentYear) {
            let hasChanged = false;
            for (let dateKey in dbData) {
                const yearOfKey = parseInt(dateKey.split('-')[0]);
                if (yearOfKey < currentYear) {
                    delete dbData[dateKey];
                    hasChanged = true;
                }
            }
            if (hasChanged) localStorage.setItem('db_cham_cong', JSON.stringify(dbData));
        }

        function renderCalendar(year, month) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";

            const firstDayIndex = new Date(year, month - 1, 1).getDay();
            const totalDays = new Date(year, month, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('button');
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month - 1, day).getDay();

                cell.innerText = day;
                cell.className = "p-3 rounded-xl font-bold text-sm transition relative flex items-center justify-center min-h-[44px]";
                
                if(dayOfWeek === 0) {
                    cell.classList.add('text-red-400', 'bg-slate-800/40');
                } else {
                    cell.classList.add('text-slate-200', 'bg-slate-700/30');
                }

                if (dbData[dateStr] && (dbData[dateStr].sang || dbData[dateStr].chieu || dbData[dateStr].trua > 0 || dbData[dateStr].toi > 0)) {
                    cell.classList.add('bg-emerald-600/30', 'text-emerald-400', 'border', 'border-emerald-500/40');
                }

                cell.onclick = () => selectDate(dateStr, day, dayOfWeek);
                grid.appendChild(cell);
            }
        }

        function selectDate(dateStr, day, dayOfWeek) {
            selectedDateStr = dateStr;
            const daysMapping = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
            document.getElementById('selected-date-label').innerText = `Ngày ${String(day).padStart(2, '0')}/${dateStr.split('-')[1]}/${dateStr.split('-')[0]} (${daysMapping[dayOfWeek]})`;
            
            const monthDayStr = `${dateStr.split('-')[2]}-${dateStr.split('-')[1]}`;
            const isHoliday = VIETNAM_HOLIDAYS.includes(monthDayStr);
            
            if(isHoliday) document.getElementById('holiday-badge').classList.remove('hidden');
            else document.getElementById('holiday-badge').classList.add('hidden');

            if(dbData[dateStr]) {
                document.getElementById('ca-sang').checked = dbData[dateStr].sang || false;
                document.getElementById('ca-chieu').checked = dbData[dateStr].chieu || false;
                document.getElementById('ca-trua').value = dbData[dateStr].trua || 0;
                document.getElementById('ca-toi').value = dbData[dateStr].toi || 0;
            } else {
                document.getElementById('ca-sang').checked = false;
                document.getElementById('ca-chieu').checked = false;
                document.getElementById('ca-trua').value = 0;
                document.getElementById('ca-toi').value = 0;
            }

            document.getElementById('detail-panel').classList.remove('hidden');
            calculateDayTotals();
        }

        function calculateDayTotals() {
            if(!selectedDateStr) return { cong: 0, gio: 0 };

            const sang = document.getElementById('ca-sang').checked;
            const chieu = document.getElementById('ca-chieu').checked;
            const truaMins = parseInt(document.getElementById('ca-trua').value) || 0;
            const toiMins = parseInt(document.getElementById('ca-toi').value) || 0;

            let totalHours = 0;

            if(sang) totalHours += 4;
            if(chieu) totalHours += 4;
            totalHours += (truaMins / 60);
            totalHours += (toiMins / 60);

            const dateObj = new Date(selectedDateStr);
            const isChunhat = (dateObj.getDay() === 0);
            const monthDayStr = `${selectedDateStr.split('-')[2]}-${selectedDateStr.split('-')[1]}`;
            const isHoliday = VIETNAM_HOLIDAYS.includes(monthDayStr);

            if(isChunhat || isHoliday) {
                totalHours = totalHours * 2;
            }

            let totalCong = totalHours / 8;

            document.getElementById('day-cong-result').innerText = `${totalCong.toFixed(2)} công`;
            document.getElementById('day-gio-result').innerText = `${totalHours.toFixed(2)} giờ`;

            return { cong: totalCong, gio: totalHours };
        }

        function updateDayData() {
            if(!selectedDateStr) return;

            const sang = document.getElementById('ca-sang').checked;
            const chieu = document.getElementById('ca-chieu').checked;
            const trua = parseInt(document.getElementById('ca-trua').value) || 0;
            const toi = parseInt(document.getElementById('ca-toi').value) || 0;

            dbData[selectedDateStr] = { sang, chieu, trua, toi };
            localStorage.setItem('db_cham_cong', JSON.stringify(dbData));

            const parts = selectedDateStr.split('-');
            renderCalendar(parseInt(parts[0]), parseInt(parts[1]));
            calculateThangTotals(parseInt(parts[0]), parseInt(parts[1]));
        }

        function calculateThangTotals(year, month) {
            let totalGioThang = 0;

            for(let dateKey in dbData) {
                const parts = dateKey.split('-');
                if(parseInt(parts[0]) === year && parseInt(parts[1]) === month) {
                    const dayData = dbData[dateKey];
                    let dayHours = 0;

                    if(dayData.sang) dayHours += 4;
                    if(dayData.chieu) dayHours += 4;
                    dayHours += (dayData.trua / 60);
                    dayHours += (dayData.toi / 60);

                    const dateObj = new Date(dateKey);
                    const isChunhat = (dateObj.getDay() === 0);
                    const monthDayStr = `${parts[2]}-${parts[1]}`;
                    const isHoliday = VIETNAM_HOLIDAYS.includes(monthDayStr);

                    if(isChunhat || isHoliday) dayHours = dayHours * 2;

                    totalGioThang += dayHours;
                }
            }

            let totalCongThang = totalGioThang / 8;

            document.getElementById('total-cong-thang').innerText = totalCongThang.toFixed(2);
            document.getElementById('total-gio-thang').innerText = totalGioThang.toFixed(2);

            // --- LOGIC TÍNH LƯƠNG MỚI THÊM VÀO ĐÂY ---
            // Lấy giá trị lương cơ bản từ ô nhập liệu, xóa bỏ dấu chấm phân tách định dạng để parse về số
            const luongCoBanStr = document.getElementById('luong-co-ban').value.replace(/\./g, "") || "0";
            const luongCoBan = parseInt(luongCoBanStr, 10);
            
            // Tính toán tổng lương thực nhận
            //  ĐOẠN CODE SỬA CHUẨN (Chia cho 26 ngày công chuẩn của tháng):
            const ngayCongChuan = 26;
            const tongLuongThang = (luongCoBan / ngayCongChuan) * totalCongThang;
            
            // Định dạng hiển thị tiền tệ kiểu vi-VN (Ví dụ: 1.250.000 VNĐ)
            document.getElementById('total-luong-thang').innerText = `${tongLuongThang.toLocaleString('vi-VN')} VNĐ`;
        }

        function formatCurrencyInput(input) {
            let value = input.value.replace(/\D/g, "");
            if(value) value = parseInt(value, 10).toLocaleString('vi-VN');
            input.value = value;
            localStorage.setItem('luong_cb', value);

            // Gọi tính toán lại tổng lương tháng khi mức lương cơ bản thay đổi
            const now = new Date();
            calculateThangTotals(now.getFullYear(), now.getMonth() + 1);
        }
    </script>
