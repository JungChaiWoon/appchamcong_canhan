<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tính Công Cá Nhân</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body class="bg-gradient-to-tr from-[#0f172a] via-[#1e1b4b] to-[#311042] text-slate-100 font-sans p-4 antialiased min-h-screen select-none pb-10">

    <div class="max-w-md mx-auto space-y-5 mt-2">
        
        <header class="bg-white/10 backdrop-blur-xl border border-white/10 p-4 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] flex justify-between items-center">
            <div>
                <h1 class="text-base font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300" id="current-month-title">Tháng Công</h1>
                <p class="text-[10px] text-slate-400">jungchaiwoon2004@gmail.com</p>
            </div>
            <div id="drive-status" class="text-[10px] bg-rose-500/10 text-rose-300 border border-rose-500/20 px-2.5 py-1 rounded-xl font-bold transition-all">Drive: Chưa kết nối</div>
        </header>

        <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.35)] space-y-4 relative overflow-hidden before:absolute before:top-0 before:left-0 before:w-full before:h-[1px] before:bg-gradient-to-r before:from-transparent before:via-white/30 before:to-transparent">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/5 border border-white/10 p-3 rounded-xl backdrop-blur-sm">
                    <p class="text-[10px] text-slate-300 uppercase font-bold tracking-wider opacity-80">Số công trong tháng</p>
                    <div class="text-3xl font-black mt-1 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300" id="total-cong-thang">0.0</div>
                </div>
                <div class="bg-white/5 border border-white/10 p-3 rounded-xl backdrop-blur-sm">
                    <p class="text-[10px] text-slate-300 uppercase font-bold tracking-wider opacity-80">Số giờ làm việc</p>
                    <div class="text-3xl font-black mt-1 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400" id="total-gio-thang">0.0</div>
                </div>
            </div>
            <div class="border-t border-white/10 pt-3.5 flex justify-between items-center px-1">
                <p class="text-xs text-slate-300 uppercase font-bold tracking-wider">Tổng lương dự kiến:</p>
                <div class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-amber-400 to-orange-400 drop-shadow-[0_2px_10px_rgba(253,224,71,0.2)]" id="total-luong-thang">0 VNĐ</div>
            </div>
        </div>

        <div class="bg-white/5 backdrop-blur-xl border border-white/10 p-3 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] grid grid-cols-2 gap-3">
            <button onclick="uploadToDrive()" id="btn-upload" class="bg-blue-500/20 hover:bg-blue-500/30 text-blue-300 border border-blue-500/30 font-bold p-2.5 rounded-xl text-xs transition-all flex items-center justify-center gap-1 opacity-50 cursor-not-allowed" disabled>
                📤 Đẩy Data lên Drive
            </button>
            <button onclick="downloadFromDrive()" id="btn-download" class="bg-teal-500/20 hover:bg-teal-500/30 text-teal-300 border border-teal-500/30 font-bold p-2.5 rounded-xl text-xs transition-all flex items-center justify-center gap-1 opacity-50 cursor-not-allowed" disabled>
                📥 Kéo Data từ Drive về
            </button>
        </div>

        <div class="bg-white/5 backdrop-blur-xl border border-white/10 p-4 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)]">
            <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-400 mb-3">
                <div class="text-rose-400">CN</div><div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div>
            </div>
            <div class="grid grid-cols-7 gap-2 text-center" id="calendar-grid"></div>
        </div>

        <div id="detail-panel" class="bg-white/10 backdrop-blur-xl border border-white/15 p-4 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] space-y-4 hidden">
            <div class="border-b border-white/10 pb-2 flex justify-between items-center">
                <h3 class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-300 text-sm" id="selected-date-label">Ngày</h3>
                <span id="holiday-badge" class="hidden bg-rose-500/20 text-rose-300 border border-rose-500/30 text-[10px] px-2 py-0.5 rounded-full font-bold">Ngày Lễ (x2)</span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <label class="flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/10 cursor-pointer hover:bg-white/10 transition-all">
                    <span class="text-xs font-medium text-slate-200">Ca Sáng (0.5)</span>
                    <input type="checkbox" id="ca-sang" onchange="updateDayData()" class="w-5 h-5 rounded accent-emerald-500">
                </label>
                <label class="flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/10 cursor-pointer hover:bg-white/10 transition-all">
                    <span class="text-xs font-medium text-slate-200">Ca Chiều (0.5)</span>
                    <input type="checkbox" id="ca-chieu" onchange="updateDayData()" class="w-5 h-5 rounded accent-emerald-500">
                </label>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Tăng ca trưa (phút):</label>
                    <input type="number" id="ca-trua" value="0" min="0" oninput="updateDayData()" class="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-slate-200 text-sm focus:outline-none focus:border-purple-400 focus:bg-white/10 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Tăng ca tối (phút):</label>
                    <input type="number" id="ca-toi" value="0" min="0" oninput="updateDayData()" class="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-slate-200 text-sm focus:outline-none focus:border-purple-400 focus:bg-white/10 transition-all">
                </div>
            </div>

            <div class="bg-white/5 p-3 rounded-xl text-xs space-y-1.5 border border-white/5">
                <div class="flex justify-between">
                    <span class="text-slate-400">Công quy đổi trong ngày:</span>
                    <span class="font-bold text-slate-200" id="day-cong-result">0.0 công</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">Tổng giờ làm trong ngày:</span>
                    <span class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400" id="day-gio-result">0 giờ</span>
                </div>
            </div>
        </div>

        <div class="bg-white/5 backdrop-blur-xl border border-white/10 p-4 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)]">
            <label class="block text-[10px] text-slate-400 mb-1.5 font-bold uppercase tracking-wider">Cấu hình lương cơ bản:</label>
            <div class="relative">
                <input type="text" id="luong-co-ban" value="6.000.000" oninput="formatCurrencyInput(this)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300 font-black focus:outline-none focus:border-purple-500 focus:bg-white/10 transition-all pr-12">
                <span class="absolute right-4 top-3.5 text-xs text-slate-500 font-bold">VNĐ</span>
            </div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH GOOGLE CLIENT ID CỦA M VÀO ĐÂY ---
        const CLIENT_ID = '390818719954-qkfh49tn2ma8vssnb17nt7ikvctj8ng0.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const FILE_NAME = 'minhtien_chamcong_db.json'; 

        let tokenClient;
        let accessToken = null;
        let dbData = {};
        let selectedDateStr = "";
        const VIETNAM_HOLIDAYS = ['01-01', '30-04', '01-05', '02-09'];

        window.onload = function() {
            gapi.load('client', initGapiClient);
            initTokenClient();
            initApp();
        };

        // --- INTERACTION VỚI GOOGLE DRIVE API ---
        function initGapiClient() {
            gapi.client.init({}).then(() => {
                gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
            }).catch(err => {
                console.error("Lỗi init GAPI client:", err);
            });
        }

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) {
                        alert("Lỗi xác thực từ Google: " + tokenResponse.error);
                        return;
                    }
                    accessToken = tokenResponse.access_token;
                    
                    document.getElementById('drive-status').innerText = "Drive: Đã Kết Nối ✅";
                    document.getElementById('drive-status').className = "text-[10px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2.5 py-1 rounded-xl font-bold";
                    
                    document.getElementById('btn-upload').disabled = false;
                    document.getElementById('btn-upload').classList.remove('opacity-50', 'cursor-not-allowed');
                    document.getElementById('btn-download').disabled = false;
                    document.getElementById('btn-download').classList.remove('opacity-50', 'cursor-not-allowed');
                    
                    if (window.pendingCallback) {
                        window.pendingCallback();
                        window.pendingCallback = null;
                    }
                },
            });
            
            document.getElementById('btn-upload').disabled = false;
            document.getElementById('btn-upload').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('btn-download').disabled = false;
            document.getElementById('btn-download').classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function checkAuth(callback) {
            if (accessToken === null) {
                window.pendingCallback = callback;
                tokenClient.requestAccessToken({ prompt: 'select_account' });
            } else {
                callback();
            }
        }

        function uploadToDrive() {
            checkAuth(() => {
                document.getElementById('btn-upload').innerText = "⏳ Đang đẩy...";
                getFolderId((folderId) => {
                    if (!folderId) {
                        alert("Lỗi xử lý thư mục!");
                        document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
                        return;
                    }
                    findFileOnDrive(folderId, (fileId) => {
                        const content = localStorage.getItem('db_cham_cong') || '{}';
                        if (fileId) {
                            updateFileContent(fileId, content);
                        } else {
                            createFileOnDrive(folderId, content);
                        }
                    });
                });
            });
        }

        function downloadFromDrive() {
            checkAuth(() => {
                document.getElementById('btn-download').innerText = "⏳ Đang kéo...";
                getFolderId((folderId) => {
                    if (!folderId) {
                        alert("Lỗi xử lý thư mục!");
                        document.getElementById('btn-download').innerText = "📥 Kéo Data từ Drive về";
                        return;
                    }
                    findFileOnDrive(folderId, (fileId) => {
                        if (!fileId) {
                            alert("Không tìm thấy file backup nào trong thư mục AppChamCong!");
                            document.getElementById('btn-download').innerText = "📥 Kéo Data từ Drive về";
                            return;
                        }
                        gapi.client.drive.files.get({
                            fileId: fileId,
                            alt: 'media'
                        }).then(response => {
                            if(response.body) {
                                localStorage.setItem('db_cham_cong', response.body);
                                alert("Kéo dữ liệu thành công! App sẽ tự động reload.");
                                location.reload();
                            }
                        }).catch(err => {
                            console.error(err);
                            alert("Lỗi khi tải file!");
                            document.getElementById('btn-download').innerText = "📥 Kéo Data từ Drive về";
                        });
                    });
                });
            });
        }

        function getFolderId(callback) {
            gapi.client.drive.files.list({
                q: "name = 'AppChamCong' and mimeType = 'application/vnd.google-apps.folder' and trashed = false",
                fields: 'files(id, name)',
                spaces: 'drive'
            }).then(response => {
                const files = response.result.files;
                if (files && files.length > 0) {
                    callback(files[0].id);
                } else {
                    gapi.client.drive.files.create({
                        resource: {
                            name: 'AppChamCong',
                            mimeType: 'application/vnd.google-apps.folder'
                        },
                        fields: 'id'
                    }).then(folderResponse => {
                        callback(folderResponse.result.id);
                    }).catch(err => {
                        console.error("Lỗi tạo folder:", err);
                        alert("Không thể tạo thư mục AppChamCong trên Drive!");
                    });
                }
            }).catch(err => {
                console.error("Lỗi tìm folder:", err);
                callback(null);
            });
        }

        function findFileOnDrive(folderId, callback) {
            gapi.client.drive.files.list({
                q: `name = '${FILE_NAME}' and '${folderId}' in parents and trashed = false`,
                fields: 'files(id, name)',
                spaces: 'drive'
            }).then(response => {
                const files = response.result.files;
                if (files && files.length > 0) {
                    callback(files[0].id);
                } else {
                    callback(null);
                }
            }).catch(err => {
                console.error("Lỗi tìm file:", err);
                callback(null);
            });
        }

        function createFileOnDrive(folderId, content) {
            const boundary = 'foo_bar_baz';
            const delimiter = "\r\n--" + boundary + "\r\n";
            const close_delimiter = "\r\n--" + boundary + "--";

            const metadata = {
                'name': FILE_NAME,
                'mimeType': 'application/json',
                'parents': [folderId]
            };

            const multipartRequestBody =
                delimiter +
                'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                JSON.stringify(metadata) +
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                content +
                close_delimiter;

            gapi.client.request({
                'path': '/upload/drive/v3/files',
                'method': 'POST',
                'params': {'uploadType': 'multipart'},
                'headers': {
                    'Content-Type': 'multipart/related; boundary="' + boundary + '"'
                },
                'body': multipartRequestBody
            }).then(() => {
                alert("Đã tạo mới và đồng bộ thành công vào thư mục AppChamCong!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            }).catch(err => {
                console.error(err);
                alert("Lỗi khi tạo file mới!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            });
        }

        function updateFileContent(fileId, content) {
            gapi.client.request({
                'path': `/upload/drive/v3/files/${fileId}`,
                'method': 'PATCH',
                'params': {'uploadType': 'media'},
                'body': content
            }).then(() => {
                alert("Đã cập nhật dữ liệu mới nhất vào thư mục AppChamCong!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            }).catch(err => {
                console.error(err);
                alert("Lỗi khi cập nhật file!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            });
        }

        // --- LOGIC CORE CỦA APP VÀ RENDER LỊCH GLASSMORPHISM ---
        function initApp() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1;

            document.getElementById('current-month-title').innerText = `Tháng ${currentMonth} / ${currentYear}`;

            if(localStorage.getItem('luong_cb')) {
                document.getElementById('luong-co-ban').value = localStorage.getItem('luong_cb');
            }

            const savedData = localStorage.getItem('db_cham_cong');
            if(savedData) dbData = JSON.parse(savedData);

            cleanOldYearData(currentYear);
            renderCalendar(currentYear, currentMonth);
            calculateThangTotals(currentYear, currentMonth);
        }

        function cleanOldYearData(currentYear) {
            let hasChanged = false;
            for (let dateKey in dbData) {
                const yearOfKey = parseInt(dateKey.split('-')[0]);
                if (yearOfKey < currentYear) {
                    delete dbData[dateKey];
                    hasChanged = true;
                }
            }
            if (hasChanged) localStorage.setItem('db_cham_cong', JSON.stringify(dbData));
        }

        function renderCalendar(year, month) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";

            const firstDayIndex = new Date(year, month - 1, 1).getDay();
            const totalDays = new Date(year, month, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('button');
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month - 1, day).getDay();

                cell.innerText = day;
                // CSS Kính mờ đồng bộ hệ thống cho từng ô ngày lịch
                cell.className = "p-3 rounded-xl font-bold text-sm transition-all relative flex items-center justify-center min-h-[44px] cursor-pointer border border-white/5";
                
                if(dayOfWeek === 0) {
                    cell.classList.add('text-rose-300', 'bg-rose-500/10', 'hover:bg-rose-500/20');
                } else {
                    cell.classList.add('text-slate-200', 'bg-white/5', 'hover:bg-white/15');
                }

                // Hiệu ứng phát sáng Neon cho ngày có chấm công
                if (dbData[dateStr] && (dbData[dateStr].sang || dbData[dateStr].chieu || dbData[dateStr].trua > 0 || dbData[dateStr].toi > 0)) {
                    cell.classList.remove('bg-white/5', 'bg-rose-500/10', 'text-slate-200', 'text-rose-300');
                    cell.classList.add('bg-gradient-to-br', 'from-emerald-500/30', 'to-teal-500/30', 'text-emerald-300', 'border-emerald-400/40', 'shadow-[0_0_12px_rgba(16,185,129,0.15)]');
                }

                cell.onclick = () => selectDate(dateStr, day, dayOfWeek);
                grid.appendChild(cell);
            }
        }

        function selectDate(dateStr, day, dayOfWeek) {
            selectedDateStr = dateStr;
            const daysMapping = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
            document.getElementById('selected-date-label').innerText = `Ngày ${String(day).padStart(2, '0')}/${dateStr.split('-')[1]}/${dateStr.split('-')[0]} (${daysMapping[dayOfWeek]})`;
            
            const monthDayStr = `${dateStr.split('-')[2]}-${dateStr.split('-')[1]}`;
            const isHoliday = VIETNAM_HOLIDAYS.includes(monthDayStr);
            
            if(isHoliday) document.getElementById('holiday-badge').classList.remove('hidden');
            else document.getElementById('holiday-badge').classList.add('hidden');

            if(dbData[dateStr]) {
                document.getElementById('ca-sang').checked = dbData[dateStr].sang || false;
                document.getElementById('ca-chieu').checked = dbData[dateStr].chieu || false;
                document.getElementById('ca-trua').value = dbData[dateStr].trua || 0;
                document.getElementById('ca-toi').value = dbData[dateStr].toi || 0;
            } else {
                document.getElementById('ca-sang').checked = false;
                document.getElementById('ca-chieu').checked = false;
                document.getElementById('ca-trua').value = 0;
                document.getElementById('ca-toi').value = 0;
            }

            document.getElementById('detail-panel').classList.remove('hidden');
            calculateDayTotals();
        }

        function calculateDayTotals() {
            if(!selectedDateStr) return { cong: 0, gio: 0 };

            const sang = document.getElementById('ca-sang').checked;
            const chieu = document.getElementById('ca-chieu').checked;
            const truaMins = parseInt(document.getElementById('ca-trua').value) || 0;
            const toiMins = parseInt(document.getElementById('ca-toi').value) || 0;

            let totalHours = 0;

            if(sang) totalHours += 4;
            if(chieu) totalHours += 4;
            totalHours += (truaMins / 60);
            totalHours += (toiMins / 60);

            const dateObj = new Date(selectedDateStr);
            const isChunhat = (dateObj.getDay() === 0);
            const monthDayStr = `${selectedDateStr.split('-')[2]}-${selectedDateStr.split('-')[1]}`;
            const isHoliday = VIETNAM_HOLIDAYS.includes(monthDayStr);

            if(isChunhat || isHoliday) {
                totalHours = totalHours * 2;
            }

            let totalCong = totalHours / 8;

            document.getElementById('day-cong-result').innerText = `${totalCong.toFixed(2)} công`;
            document.getElementById('day-gio-result').innerText = `${totalHours.toFixed(2)} giờ`;

            return { cong: totalCong, gio: totalHours };
        }

        function updateDayData() {
            if(!selectedDateStr) return;

            const sang = document.getElementById('ca-sang').checked;
            const chieu = document.getElementById('ca-chieu').checked;
            const trua = parseInt(document.getElementById('ca-trua').value) || 0;
            const toi = parseInt(document.getElementById('ca-toi').value) || 0;

            dbData[selectedDateStr] = { sang, chieu, trua, toi };
            localStorage.setItem('db_cham_cong', JSON.stringify(dbData));

            const parts = selectedDateStr.split('-');
            renderCalendar(parseInt(parts[0]), parseInt(parts[1]));
            calculateThangTotals(parseInt(parts[0]), parseInt(parts[1]));
        }

        function calculateThangTotals(year, month) {
            let totalGioThang = 0;

            for(let dateKey in dbData) {
                const parts = dateKey.split('-');
                if(parseInt(parts[0]) === year && parseInt(parts[1]) === month) {
                    const dayData = dbData[dateKey];
                    let dayHours = 0;

                    if(dayData.sang) dayHours += 4;
                    if(dayData.chieu) dayHours += 4;
                    dayHours += (dayData.trua / 60);
                    dayHours += (dayData.toi / 60);

                    const dateObj = new Date(dateKey);
                    const isChunhat = (dateObj.getDay() === 0);
                    const monthDayStr = `${parts[2]}-${parts[1]}`;
                    const isHoliday = VIETNAM_HOLIDAYS.includes(monthDayStr);

                    if(isChunhat || isHoliday) dayHours = dayHours * 2;

                    totalGioThang += dayHours;
                }
            }

            let totalCongThang = totalGioThang / 8;

            document.getElementById('total-cong-thang').innerText = totalCongThang.toFixed(2);
            document.getElementById('total-gio-thang').innerText = totalGioThang.toFixed(2);

            const luongCoBanStr = document.getElementById('luong-co-ban').value.replace(/\./g, "") || "0";
            const luongCoBan = parseInt(luongCoBanStr, 10);
            
            const ngayCongChuan = 26;
            const tongLuongThang = (luongCoBan / ngayCongChuan) * totalCongThang;
            
            document.getElementById('total-luong-thang').innerText = `${Math.round(tongLuongThang).toLocaleString('vi-VN')} VNĐ`;
        }

        function formatCurrencyInput(input) {
            let value = input.value.replace(/\D/g, "");
            if(value) value = parseInt(value, 10).toLocaleString('vi-VN');
            input.value = value;
            localStorage.setItem('luong_cb', value);

            const now = new Date();
            calculateThangTotals(now.getFullYear(), now.getMonth() + 1);
        }
    </script>
</body>
</html>
