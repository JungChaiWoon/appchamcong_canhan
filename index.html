    <style>
        /* Hiệu ứng dải lụa màu chuyển động ngầm phía sau tấm kính giống iOS/HyperOS */
        @keyframes liquid-ambient {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        /* Hiệu ứng trôi nổi bồng bềnh của các bong bóng thủy tinh 3D */
        @keyframes bubble-float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-30px) rotate(360deg); }
        }
        .bg-blur-blob-1 { animation: liquid-ambient 20s infinite alternate; }
        .bg-blur-blob-2 { animation: liquid-ambient 25s infinite alternate-reverse; }
        
        .bubble-1 { animation: bubble-float 8s infinite alternate ease-in-out; }
        .bubble-2 { animation: bubble-float 12s infinite alternate-reverse ease-in-out; }

        /* Tối ưu thanh cuộn mượt mà */
        ::-webkit-scrollbar { width: 0px; }
    </style>

    <script>
        // --- CẤU HÌNH GOOGLE CLIENT ID CỦA M VÀO ĐÂY ---
        const CLIENT_ID = '390818719954-qkfh49tn2ma8vssnb17nt7ikvctj8ng0.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const FILE_NAME = 'minhtien_chamcong_db.json'; 

        let tokenClient;
        let accessToken = null;
        let dbData = {};

        let viewingYear = new Date().getFullYear();
        let viewingMonth = new Date().getMonth() + 1;

        function changeMonth(direction) {
            viewingMonth += direction;
            if (viewingMonth > 12) {
                viewingMonth = 1;
                viewingYear += 1;
            } else if (viewingMonth < 1) {
                viewingMonth = 12;
                viewingYear -= 1;
            }
            
            document.getElementById('current-month-title').innerText = `Tháng ${viewingMonth} / ${viewingYear}`;
            renderCalendar(viewingYear, viewingMonth);
            calculateThangTotals(viewingYear, viewingMonth);
            document.getElementById('detail-panel').classList.add('hidden');
        }

        let selectedDateStr = "";
        const VIETNAM_HOLIDAYS = ['01-01', '30-04', '01-05', '02-09'];

        window.onload = function() {
            gapi.load('client', initGapiClient);
            initTokenClient();
            initApp();
        };

        function initGapiClient() {
            gapi.client.init({}).then(() => {
                gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
            }).catch(err => {
                console.error("Lỗi init GAPI client:", err);
            });
        }

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) {
                        alert("Lỗi xác thực từ Google: " + tokenResponse.error);
                        return;
                    }
                    accessToken = tokenResponse.access_token;
                    
                    document.getElementById('drive-status').innerText = "Drive: Đã Kết Nối ✅";
                    document.getElementById('drive-status').className = "text-[10px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 px-2.5 py-1 rounded-xl font-bold shadow-[0_0_10px_rgba(16,185,129,0.2)]";
                    
                    document.getElementById('btn-upload').disabled = false;
                    document.getElementById('btn-upload').classList.remove('opacity-50', 'cursor-not-allowed');
                    document.getElementById('btn-download').disabled = false;
                    document.getElementById('btn-download').classList.remove('opacity-50', 'cursor-not-allowed');
                    
                    if (window.pendingCallback) {
                        window.pendingCallback();
                        window.pendingCallback = null;
                    }
                },
            });
            
            document.getElementById('btn-upload').disabled = false;
            document.getElementById('btn-upload').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('btn-download').disabled = false;
            document.getElementById('btn-download').classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function checkAuth(callback) {
            if (accessToken === null) {
                window.pendingCallback = callback;
                tokenClient.requestAccessToken({ prompt: 'select_account' });
            } else {
                callback();
            }
        }

        function uploadToDrive() {
            checkAuth(() => {
                document.getElementById('btn-upload').innerHTML = '<span class="text-base mr-1.5">⏳</span> Đang đẩy...';
                getFolderId((folderId) => {
                    if (!folderId) {
                        alert("Lỗi xử lý thư mục!");
                        document.getElementById('btn-upload').innerHTML = '<span class="text-base mr-1.5">📤</span> Đẩy Data lên Drive';
                        return;
                    }
                    findFileOnDrive(folderId, (fileId) => {
                        const content = localStorage.getItem('db_cham_cong') || '{}';
                        if (fileId) {
                            updateFileContent(fileId, content);
                        } else {
                            createFileOnDrive(folderId, content);
                        }
                    });
                });
            });
        }

        function downloadFromDrive() {
            checkAuth(() => {
                document.getElementById('btn-download').innerHTML = '<span class="text-base mr-1.5">⏳</span> Đang kéo...';
                getFolderId((folderId) => {
                    if (!folderId) {
                        alert("Lỗi xử lý thư mục!");
                        document.getElementById('btn-download').innerHTML = '<span class="text-base mr-1.5">📥</span> Kéo Data từ Drive về';
                        return;
                    }
                    findFileOnDrive(folderId, (fileId) => {
                        if (!fileId) {
                            alert("Không tìm thấy file backup nào trong thư mục AppChamCong!");
                            document.getElementById('btn-download').innerHTML = '<span class="text-base mr-1.5">📥</span> Kéo Data từ Drive về';
                            return;
                        }
                        gapi.client.drive.files.get({
                            fileId: fileId,
                            alt: 'media'
                        }).then(response => {
                            if(response.body) {
                                localStorage.setItem('db_cham_cong', response.body);
                                alert("Kéo dữ liệu thành công! App sẽ tự động reload.");
                                location.reload();
                            }
                        }).catch(err => {
                            console.error(err);
                            alert("Lỗi khi tải file!");
                            document.getElementById('btn-download').innerHTML = '<span class="text-base mr-1.5">📥</span> Kéo Data từ Drive về';
                        });
                    });
                });
            });
        }

        function getFolderId(callback) {
            gapi.client.drive.files.list({
                q: "name = 'AppChamCong' and mimeType = 'application/vnd.google-apps.folder' and trashed = false",
                fields: 'files(id, name)',
                spaces: 'drive'
            }).then(response => {
                const files = response.result.files;
                if (files && files.length > 0) {
                    callback(files[0].id);
                } else {
                    gapi.client.drive.files.create({
                        resource: {
                            name: 'AppChamCong',
                            mimeType: 'application/vnd.google-apps.folder'
                        },
                        fields: 'id'
                    }).then(folderResponse => {
                        callback(folderResponse.result.id);
                    }).catch(err => {
                        console.error("Lỗi tạo folder:", err);
                        alert("Không thể tạo thư mục AppChamCong trên Drive!");
                    });
                }
            }).catch(err => {
                console.error("Lỗi tìm folder:", err);
                callback(null);
            });
        }

        function findFileOnDrive(folderId, callback) {
            gapi.client.drive.files.list({
                q: `name = '${FILE_NAME}' and '${folderId}' in parents and trashed = false`,
                fields: 'files(id, name)',
                spaces: 'drive'
            }).then(response => {
                const files = response.result.files;
                if (files && files.length > 0) {
                    callback(files[0].id);
                } else {
                    callback(null);
                }
            }).catch(err => {
                console.error("Lỗi tìm file:", err);
                callback(null);
            });
        }

        function createFileOnDrive(folderId, content) {
            const boundary = 'foo_bar_baz';
            const delimiter = "\r\n--" + boundary + "\r\n";
            const close_delimiter = "\r\n--" + boundary + "--";

            const metadata = {
                'name': FILE_NAME,
                'mimeType': 'application/json',
                'parents': [folderId]
            };

            const multipartRequestBody =
                delimiter +
                'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                JSON.stringify(metadata) +
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                content +
                close_delimiter;

            gapi.client.request({
                'path': '/upload/drive/v3/files',
                'method': 'POST',
                'params': {'uploadType': 'multipart'},
                'headers': {
                    'Content-Type': 'multipart/related; boundary="' + boundary + '"'
                },
                'body': multipartRequestBody
            }).then(() => {
                alert("Đã tạo mới và đồng bộ thành công vào thư mục AppChamCong!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            }).catch(err => {
                console.error(err);
                alert("Lỗi khi tạo file mới!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            });
        }

        function updateFileContent(fileId, content) {
            gapi.client.request({
                'path': `/upload/drive/v3/files/${fileId}`,
                'method': 'PATCH',
                'params': {'uploadType': 'media'},
                'body': content
            }).then(() => {
                alert("Đã cập nhật dữ liệu mới nhất vào thư mục AppChamCong!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            }).catch(err => {
                console.error(err);
                alert("Lỗi khi cập nhật file!");
                document.getElementById('btn-upload').innerText = "📤 Đẩy Data lên Drive";
            });
        }

        function initApp() {
            const now = new Date();
            viewingYear = now.getFullYear();
            viewingMonth = now.getMonth() + 1;

            document.getElementById('current-month-title').innerText = `Tháng ${viewingMonth} / ${viewingYear}`;

            if(localStorage.getItem('luong_cb')) {
                document.getElementById('luong-co-ban').value = localStorage.getItem('luong_cb');
            }

            const savedData = localStorage.getItem('db_cham_cong');
            if(savedData) dbData = JSON.parse(savedData);

            cleanOldYearData(viewingYear);
            
            renderCalendar(viewingYear, viewingMonth);
            calculateThangTotals(viewingYear, viewingMonth);
        }

        function cleanOldYearData(currentYear) {
            let hasChanged = false;
            for (let dateKey in dbData) {
                const yearOfKey = parseInt(dateKey.split('-')[0]);
                if (yearOfKey < currentYear) {
                    delete dbData[dateKey];
                    hasChanged = true;
                }
            }
            if (hasChanged) localStorage.setItem('db_cham_cong', JSON.stringify(dbData));
        }

        // --- RENDER GRID LỊCH CHUẨN NEON GLASS EFFECT 3D ---
        function renderCalendar(year, month) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";

            const firstDayIndex = new Date(year, month - 1, 1).getDay();
            const totalDays = new Date(year, month, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('button');
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month - 1, day).getDay();

                cell.innerText = day;
                // Tạo viền 3D dầy đổ bóng khối cho ô ngày thường
                cell.className = "p-3 rounded-2xl font-bold text-sm transition-all relative flex items-center justify-center min-h-[44px] cursor-pointer border border-white/[0.04] shadow-[inset_0_1px_2px_rgba(255,255,255,0.05),0_4px_10px_rgba(0,0,0,0.3)] bg-white/[0.02]";
                
                if(dayOfWeek === 0) {
                    cell.classList.add('text-rose-300', 'bg-rose-500/5', 'border-rose-500/10', 'hover:bg-rose-500/15');
                } else {
                    cell.classList.add('text-slate-300', 'hover:bg-white/[0.08]');
                }

                // HIỆU ỨNG TIA SÁNG NEON PHÁT SÁNG DROP-SHADOW MẠNH MẼ THEO ẢNH BD5C20 KHI CÓ CÔNG
                if (dbData[dateStr] && (dbData[dateStr].sang || dbData[dateStr].chieu || dbData[dateStr].sangMins > 0 || dbData[dateStr].trua > 0 || dbData[dateStr].toi > 0)) {
                    cell.classList.remove('bg-white/[0.02]', 'bg-rose-500/5', 'text-slate-300', 'text-rose-300', 'border-white/[0.04]', 'border-rose-500/10');
                    cell.classList.add('bg-black/40', 'text-emerald-300', 'border-emerald-400', 'shadow-[0_0_18px_rgba(52,211,153,0.5),inset_0_1px_2px_rgba(255,255,255,0.2)]');
                }

                cell.onclick = () => selectDate(dateStr, day, dayOfWeek);
                grid.appendChild(cell);
            }
        }

        function selectDate(dateStr, day, dayOfWeek) {
            selectedDateStr = dateStr;
            const daysMapping = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
            document.getElementById('selected-date-label').innerText = `Ngày ${String(day).padStart(2, '0')}/${dateStr.split('-')[1]}/${dateStr.split('-')[0]} (${daysMapping[dayOfWeek]})`;
            
            const monthDayStr = `${dateStr.split('-')[2]}-${dateStr.split('-')[1]}`;
            const isHoliday = VIETNAM_HOLIDAYS.includes(monthDayStr);
            
            if(isHoliday) document.getElementById('holiday-badge').classList.remove('hidden');
            else document.getElementById('holiday-badge').classList.add('hidden');

            if(dbData[dateStr]) {
                document.getElementById('ca-sang').checked = dbData[dateStr].sang || false;
                document.getElementById('ca-chieu').checked = dbData[dateStr].chieu || false;
                document.getElementById('ca-sang-mins').value = dbData[dateStr].sangMins || 0;
                document.getElementById('ca-trua').value = dbData[dateStr].trua || 0;
                document.getElementById('ca-toi').value = dbData[dateStr].toi || 0;
            } else {
                document.getElementById('ca-sang').checked = false;
                document.getElementById('ca-chieu').checked = false;
                document.getElementById('ca-sang-mins').value = 0;
                document.getElementById('ca-trua').value = 0;
                document.getElementById('ca-toi').value = 0;
            }

            document.getElementById('detail-panel').classList.remove('hidden');
            calculateDayTotals();
        }

        function calculateDayTotals() {
            if(!selectedDateStr) return { cong: 0, gio: 0 };

            const sang = document.getElementById('ca-sang').checked;
            const chieu = document.getElementById('ca-chieu').checked;
            const sangMins = parseInt(document.getElementById('ca-sang-mins').value) || 0;
            const truaMins = parseInt(document.getElementById('ca-trua').value) || 0;
            const toiMins = parseInt(document.getElementById('ca-toi').value) || 0;

            let totalHours = 0;

            if(sang) totalHours += 4;
            if(chieu) totalHours += 4;
            totalHours += (sangMins / 60);
            totalHours += (truaMins / 60);
            totalHours += (toiMins / 60);

            const dateObj = new Date(selectedDateStr);
            const isChunhat = (dateObj.getDay() === 0);
            const monthDayStr = `${selectedDateStr.split('-')[2]}-${selectedDateStr.split('-')[1]}`;
            const isHoliday = VIETNAM_HOLIDAYS.includes(monthDayStr);

            if(isChunhat || isHoliday) {
                totalHours = totalHours * 2;
            }

            let totalCong = totalHours / 8;

            document.getElementById('day-cong-result').innerText = `${totalCong.toFixed(2)} công`;
            document.getElementById('day-gio-result').innerText = `${totalHours.toFixed(2)} giờ`;

            return { cong: totalCong, gio: totalHours };
        }

        function updateDayData() {
            if(!selectedDateStr) return;

            const sang = document.getElementById('ca-sang').checked;
            const chieu = document.getElementById('ca-chieu').checked;
            const sangMins = parseInt(document.getElementById('ca-sang-mins').value) || 0;
            const trua = parseInt(document.getElementById('ca-trua').value) || 0;
            const toi = parseInt(document.getElementById('ca-toi').value) || 0;

            dbData[selectedDateStr] = { sang, chieu, sangMins, trua, toi };
            localStorage.setItem('db_cham_cong', JSON.stringify(dbData));

            const parts = selectedDateStr.split('-');
            renderCalendar(parseInt(parts[0]), parseInt(parts[1]));
            calculateThangTotals(parseInt(parts[0]), parseInt(parts[1]));
        }

        function calculateThangTotals(year, month) {
            let totalGioThang = 0;

            for(let dateKey in dbData) {
                const parts = dateKey.split('-');
                if(parseInt(parts[0]) === year && parseInt(parts[1]) === month) {
                    const dayData = dbData[dateKey];
                    let dayHours = 0;

                    if(dayData.sang) dayHours += 4;
                    if(dayData.chieu) dayHours += 4;
                    if(dayData.sangMins) dayHours += (dayData.sangMins / 60);
                    dayHours += (dayData.trua / 60);
                    dayHours += (dayData.toi / 60);

                    const dateObj = new Date(dateKey);
                    const isChunhat = (dateObj.getDay() === 0);
                    const monthDayStr = `${parts[2]}-${parts[1]}`;
                    const isHoliday = VIETNAM_HOLIDAYS.includes(monthDayStr);

                    if(isChunhat || isHoliday) dayHours = dayHours * 2;

                    totalGioThang += dayHours;
                }
            }

            let totalCongThang = totalGioThang / 8;

            document.getElementById('total-cong-thang').innerText = totalCongThang.toFixed(2);
            document.getElementById('total-gio-thang').innerText = totalGioThang.toFixed(2);

            const luongCoBanStr = document.getElementById('luong-co-ban').value.replace(/\./g, "") || "0";
            const luongCoBan = parseInt(luongCoBanStr, 10);
            
            const ngayCongChuan = 26;
            const tongLuongThang = (luongCoBan / ngayCongChuan) * totalCongThang;
            
            document.getElementById('total-luong-thang').innerText = `${Math.round(tongLuongThang).toLocaleString('vi-VN')} VNĐ`;
        }

        function formatCurrencyInput(input) {
            let value = input.value.replace(/\D/g, "");
            if(value) value = parseInt(value, 10).toLocaleString('vi-VN');
            input.value = value;
            localStorage.setItem('luong_cb', value);

            const now = new Date();
            calculateThangTotals(now.getFullYear(), now.getMonth() + 1);
        }
    </script>
